# abloq codebook — filefunc 어휘 (Phase001~005 범위, 이후 Phase에서 증보)
required:
  feature:
    archive: "아카이버 — 배포 변경 URL의 영수증 계획과 Wayback/IndexNow/GSC 일괄 제출, CLI와 abloqd 백엔드가 공유 (Phase008)"
    blogyaml: "blog.yaml SSOT — 스키마, strict 파싱, 기본값 주입, 검증 룰"
    cli: "abloq CLI — cobra 명령과 진단 출력"
    gen: "blog.yaml 파생물 생성기 — hugo.toml/robots.txt/llms.txt/JSON-LD 멱등 렌더링과 드리프트 체크"
    bots: "AI봇 UA 사전 — 훈련/검색/fetch 분류, robots 생성과 크롤 수집(Phase012)이 공유"
    gate: "구조 게이트 룰셋 — 저장소+blog.yaml+대상 글 입력으로 룰 단위 진단 생성, reins가 라이브러리로 호출"
    init: "abloq init 스캐폴딩 — blog.yaml 작성, 템플릿(degit식) 복제, 디렉토리 골격"
    postbuild: ".md 병행 서빙 — 빌드 산출물 옆에 글마다 노이즈 제로 .md 생성 (AI 컨텍스트 포맷)"
    image: "이미지 도구 — OG 카드(1200×630) 생성과 WebP 변환, 순수 Go (외부 바이너리 없음)"
    claudemd: "CLAUDE.md 생성기 — blog.yaml에서 에이전트 운영 매뉴얼(게시 절차/게이트/금지사항) 렌더"
    content: "콘텐츠 인덱서 — 발행 글 front matter 전수 파싱 → 인덱스 항목(posts 1행 대응), CLI와 abloqd 백엔드가 공유 (Phase007)"
    scan: "콘텐츠 스캐너 — freshness_days 초과 글·무출처 수치 주장·인용 link rot·클러스터 위반(태그·내부링크 그래프) 검출 → 우선순위 큐 후보, CLI와 abloqd 백엔드가 공유 (Phase009·010·011)"
    queueio: "큐 exporter 공통 모듈 — queue_items → quests/queue/*.yaml 결정적 직렬화 + 전용 작업 클론 커밋·푸시, 역방향 consumed 동기화 (Phase009, Phase010·011 재사용)"
    visibility: "가시성 우선순위 — 글별 신호(crawl_hits 합계, date)를 큐 우선순위 점수로 환산 (Phase009 콜드스타트, Phase014 측정 기반 합류)"
  type:
    schema: "도메인 데이터 모델 — blog.yaml 스키마, 진단, 봇 UA, 발행 글, 산출물"
    parser: "파싱·수집 — strict YAML 디코드, front matter, 콘텐츠 스캔, 라인 인덱스"
    rule: "개별 검증 룰 (룰ID 1개 담당) 또는 드리프트 진단"
    command: "cobra 명령 진입점과 실행 로직"
    output: "진단 출력 포맷 (text / json)"
    generator: "파생물 렌더러 — 같은 입력이면 바이트 동일 출력 (멱등)"
    dict: "정적 사전 데이터 제공과 조회"
    frame: "게이트 공통 프레임 — 타깃 조립, 룰 레지스트리, 실행기, 글 수집"
    client: "외부 API 클라이언트 — env 베이스 URL 오버라이드, 응답을 영수증으로 환원"
    scorer: "우선순위 산출 — 같은 신호면 같은 점수(결정적), Scorer 인터페이스와 구현"

optional:
  topic:
    diagnostics: "파일:라인 [룰ID] 메시지 진단 형식"
    evidence: "근거 게이트 — 출처 수, 무출처 수치 주장, 인용 URL 실재 검증 (Phase010 스캐너와 검출기 공유)"
    cluster: "클러스터 스캐너 — 기본 언어 태그·내부링크 그래프, 위반 4종(taxonomy/고아 태그/링크 부족/고립)과 연결 후보 제안, topical authority 큐 (Phase011)"
    drift: "재생성 결과와 디스크 산출물의 바이트 비교 진단"
    baseline: "git HEAD 스냅샷을 원본으로 한 변경 전후 비교 (치즈 방어)"
    lossless: "본문 무손실 multiset 비교 — 번역·재배열 퀘스트의 치즈 방어"
