tables:
  users: {}
  posts: {}
  receipts: {}
  queue_items: {}
  crawl_hits: {}
  gsc_snapshots: {}
  citation_queries:
    has_many:
      - citation_samples
  citation_samples:
    belongs_to:
      - citation_queries

features:
  - op: Login
    path: POST /auth/login
    desc: Authenticate the operator and issue a JWT bearer token
    table: users
    public: true

  - op: Sync
    path: POST /sync
    desc: Parse every front matter in the blog repository and upsert the posts index
    table: posts

  - op: ListPosts
    path: GET /posts
    desc: List the indexed posts
    table: posts

  - op: HookDeployed
    path: POST /hooks/deployed
    desc: Record pending archive receipts for the changed URLs of a deploy (idempotent per deploy_id)
    table: receipts

  - op: ProcessArchive
    path: POST /archive/process
    desc: Execute pending archive receipts against Wayback, IndexNow and the GSC Indexing API
    table: receipts

  - op: RetryReceipts
    path: POST /receipts/retry
    desc: Rearm failed and deferred archive receipts back to pending
    table: receipts

  - op: ListReceipts
    path: GET /receipts
    desc: List archive receipts filtered by target, kind, deploy_id and status
    table: receipts
