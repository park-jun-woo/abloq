tables:
  users: {}
  posts: {}
  receipts: {}
  queue_items: {}
  crawl_hits: {}
  ingest_cursors: {}
  unknown_bots: {}
  gsc_snapshots: {}
  citation_queries:
    has_many:
      - citation_samples
  citation_samples:
    belongs_to:
      - citation_queries
  citation_checks: {}

features:
  - op: Login
    path: POST /auth/login
    desc: Authenticate the operator and issue a JWT bearer token
    table: users
    public: true

  - op: Sync
    path: POST /sync
    desc: Parse every front matter in the blog repository and upsert the posts index
    table: posts

  - op: ListPosts
    path: GET /posts
    desc: List the indexed posts
    table: posts

  - op: HookDeployed
    path: POST /hooks/deployed
    desc: Record pending archive receipts for the changed URLs of a deploy (idempotent per deploy_id)
    table: receipts

  - op: ProcessArchive
    path: POST /archive/process
    desc: Execute pending archive receipts against Wayback, IndexNow and the GSC Indexing API
    table: receipts

  - op: RetryReceipts
    path: POST /receipts/retry
    desc: Rearm failed and deferred archive receipts back to pending
    table: receipts

  - op: ListReceipts
    path: GET /receipts
    desc: List archive receipts filtered by target, kind, deploy_id and status
    table: receipts

  - op: ScanFreshness
    path: POST /scans/freshness
    desc: Detect articles whose lastmod exceeded geo.freshness_days and enqueue refresh candidates (idempotent — open/exported duplicates are skipped)
    table: queue_items

  - op: ScanEvidence
    path: POST /scans/evidence
    desc: Detect unsourced numeric claims and confirmed link rot (3 consecutive failed scans) and enqueue evidence candidates (idempotent)
    table: queue_items

  - op: ScanCluster
    path: POST /scans/cluster
    desc: Detect cluster violations (taxonomy drift, orphan tags, missing internal links, isolated posts) and enqueue curation candidates with link suggestions (idempotent)
    table: queue_items

  - op: ExportQueue
    path: POST /queue/export
    desc: Export open queue items as quests/queue/*.yaml commits to the blog repository and sync agent-deleted files back to consumed
    table: queue_items

  - op: ListQueue
    path: GET /queue
    desc: List queue items filtered by kind and status
    table: queue_items

  - op: IngestCrawl
    path: POST /ingest/crawl
    desc: Aggregate AI-bot hits from CloudFront logs into crawl_hits (closed-hour cursor, idempotent re-ingest)
    table: crawl_hits

  - op: ListCrawlHits
    path: GET /crawl-hits
    desc: List aggregated crawl hits filtered by lang, section, slug and hit_date range
    table: crawl_hits
