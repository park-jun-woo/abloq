apiVersion: yongol/v1
kind: Project
metadata:
  name: abloqd
  description: "abloq operations backend — content index, receipts, queues, visibility metrics"
backend:
  lang: go
  framework: gin
  module: github.com/park-jun-woo/abloqd
  middleware:
    - bearerAuth
  auth:
    type: jwt
    mode: bearer
    secret_env: JWT_SECRET
    user_table: users
    claims:
      ID: id:int64
      Email: email:string
      Role: role:string
    roles:
      - operator
  rate_limit:
    Login:
      rate: 5
      period: "1m"
      key: ip
  http:
    # Loopback reverse proxy (compose/CDN sidecar). Override per deployment
    # with BACKEND_HTTP_TRUSTED_PROXIES so the IP-keyed Login rate limit
    # sees the real client IP (C-11).
    trusted_proxies:
      - 127.0.0.1/32
      - ::1/128
# queue/cache postgres backends arrive with their first users — the queue
# consumers (Phase018). The archiver (Phase008) uses the receipts table as
# its queue (pending → done|failed|deferred), not @publish/@subscribe.
# XSA-75/XSA-77 forbid declaring infra backends no SSaC sequence uses.
frontend:
  enabled: false
  lang: typescript
  framework: react
  bundler: vite
  name: abloqd-web
