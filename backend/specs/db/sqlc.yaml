version: "2"
sql:
  - engine: postgresql
    schema: .
    queries: queries
    gen:
      go:
        package: db
        out: ../../arts/backend/internal/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        overrides:
          - db_type: "timestamptz"
            nullable: false
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Timestamptz"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Timestamptz"
          - db_type: "date"
            nullable: false
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Date"
          - db_type: "date"
            nullable: true
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Date"
