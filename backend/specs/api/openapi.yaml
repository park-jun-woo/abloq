openapi: 3.0.3
info:
  title: Abloqd
  description: abloq operations backend — content index, receipts, queues, visibility metrics (multisite — one instance serves every declared site)
  version: 0.2.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: string }
    Site:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        repo_path: { type: string }
        queue_export_repo: { type: string, description: "queue export origin URL — empty disables the site's queue export" }
        queue_export_author: { type: string }
        queue_export_author_email: { type: string }
        gsc_site: { type: string, description: "Search Console property — URL-prefix or sc-domain:" }
        gsc_sa_path: { type: string, description: "mounted service-account JSON path — empty falls back to the global env" }
        cf_log_source: { type: string }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Receipt:
      type: object
      properties:
        id: { type: integer, format: int64 }
        site_id: { type: integer, format: int64 }
        deploy_id: { type: string }
        kind: { type: string }
        target: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
    QueueItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        site_id: { type: integer, format: int64 }
        kind: { type: string }
        slug: { type: string }
        lang: { type: string }
        priority: { type: integer, format: int64 }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Post:
      type: object
      properties:
        id: { type: integer, format: int64 }
        site_id: { type: integer, format: int64 }
        lang: { type: string }
        section: { type: string }
        slug: { type: string }
        title: { type: string }
        date: { type: string }
        lastmod: { type: string }
        word_count: { type: integer, format: int64 }
        internal_links: { type: integer, format: int64 }
        source_count: { type: integer, format: int64 }
        url: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CrawlHit:
      type: object
      properties:
        id: { type: integer, format: int64 }
        site_id: { type: integer, format: int64 }
        hit_date: { type: string, format: date-time }
        bot: { type: string }
        lang: { type: string }
        section: { type: string }
        slug: { type: string }
        hits: { type: integer, format: int64 }
        md_hits: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
    CitationQuery:
      type: object
      properties:
        id: { type: integer, format: int64 }
        site_id: { type: integer, format: int64 }
        lang: { type: string }
        section: { type: string }
        slug: { type: string }
        query_text: { type: string }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
    CitationSample:
      type: object
      properties:
        id: { type: integer, format: int64 }
        citation_queries_id: { type: integer, format: int64 }
        engine: { type: string }
        cited: { type: boolean }
        evidence: { type: string }
        extractor_version: { type: string }
        run_at: { type: string, format: date-time }
paths:
  /auth/login:
    post:
      operationId: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, maxLength: 255 }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites:
    get:
      operationId: ListSites
      security:
        - bearerAuth: []
      parameters:
        - name: active_filter
          in: query
          required: false
          schema: { type: string, enum: ["", "true", "false"] }
      responses:
        '200':
          description: OK — the declared sites of this instance (sites.yaml SSOT, upserted at boot)
          content:
            application/json:
              schema:
                type: object
                properties:
                  sites:
                    type: array
                    items: { $ref: '#/components/schemas/Site' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/sync:
    post:
      operationId: Sync
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  synced: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/hooks/deployed:
    post:
      operationId: HookDeployed
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deploy_id, changed]
              properties:
                deploy_id: { type: string, minLength: 1, maxLength: 255 }
                changed:
                  type: array
                  items: { type: string }
      responses:
        '202':
          description: Accepted — pending receipts recorded, no external call yet
          content:
            application/json:
              schema:
                type: object
                properties:
                  planned: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/archive/process:
    post:
      operationId: ProcessArchive
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limit]
              properties:
                limit: { type: integer, format: int64, minimum: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer, format: int64 }
                  done: { type: integer, format: int64 }
                  failed: { type: integer, format: int64 }
                  deferred: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/receipts/retry:
    post:
      operationId: RetryReceipts
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deploy_id, kind_filter]
              properties:
                deploy_id: { type: string, description: "filter — empty string means all deploys" }
                kind_filter: { type: string, description: "filter — empty string means all kinds" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/receipts:
    get:
      operationId: ListReceipts
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: target
          in: query
          required: false
          schema: { type: string }
        - name: kind
          in: query
          required: false
          schema: { type: string }
        - name: deploy_id
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  receipts:
                    type: array
                    items: { $ref: '#/components/schemas/Receipt' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/scans/freshness:
    post:
      operationId: ScanFreshness
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ym]
              properties:
                ym: { type: string, maxLength: 7, description: "measurement window anchor YYYY-MM — empty string means the last closed month (UTC); detection is unaffected, only the priority signals" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  detected: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/scans/evidence:
    post:
      operationId: ScanEvidence
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  detected: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/scans/cluster:
    post:
      operationId: ScanCluster
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  detected: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/queue/export:
    post:
      operationId: ExportQueue
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  exported: { type: integer, format: int64 }
                  consumed: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/queue:
    get:
      operationId: ListQueue
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: kind
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/QueueItem' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/ingest/crawl:
    post:
      operationId: IngestCrawl
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  files: { type: integer, format: int64 }
                  hits: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/crawl-hits:
    get:
      operationId: ListCrawlHits
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: lang
          in: query
          required: false
          schema: { type: string }
        - name: section
          in: query
          required: false
          schema: { type: string }
        - name: slug
          in: query
          required: false
          schema: { type: string }
        - name: from_date
          in: query
          required: false
          schema: { type: string }
        - name: to_date
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits:
                    type: array
                    items: { $ref: '#/components/schemas/CrawlHit' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/ingest/gsc:
    post:
      operationId: IngestGSC
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inspect]
              properties:
                inspect: { type: boolean, description: "opt into the URL Inspection summary (quota guard — keep false in cron wiring)" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  days: { type: integer, format: int64 }
                  rows: { type: integer, format: int64 }
                  inspected: { type: integer, format: int64 }
                  inspections: { type: string, description: "URL Inspection verdict summaries as a JSON array string ('[]' when inspect=false)" }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/citation-queries:
    post:
      operationId: CreateCitationQuery
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lang, section, slug, query_text]
              properties:
                lang: { type: string, minLength: 1, maxLength: 35 }
                section: { type: string, minLength: 1 }
                slug: { type: string, minLength: 1 }
                query_text: { type: string, minLength: 1 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  lang: { type: string }
                  section: { type: string }
                  slug: { type: string }
                  query_text: { type: string }
                  active: { type: boolean }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    get:
      operationId: ListCitationQueries
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: slug
          in: query
          required: false
          schema: { type: string }
        - name: active_filter
          in: query
          required: false
          schema: { type: string, enum: ["", "true", "false"] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  queries:
                    type: array
                    items: { $ref: '#/components/schemas/CitationQuery' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/citation-queries/{id}:
    delete:
      operationId: DeleteCitationQuery
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Deactivated (soft delete — samples keep their FK history)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  active: { type: boolean }
        '404':
          description: Not found — unknown query id, unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/sample/citations:
    post:
      operationId: SampleCitations
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  engines: { type: integer, format: int64 }
                  sampled: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sites/{site}/citations:
    get:
      operationId: ListCitations
      security:
        - bearerAuth: []
      parameters:
        - name: site
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: slug
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  samples:
                    type: array
                    items: { $ref: '#/components/schemas/CitationSample' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Not found — unregistered or deactivated site
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
