openapi: 3.0.3
info:
  title: Abloqd
  description: abloq operations backend — content index, receipts, queues, visibility metrics
  version: 0.1.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: string }
    Receipt:
      type: object
      properties:
        id: { type: integer, format: int64 }
        deploy_id: { type: string }
        kind: { type: string }
        target: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
    Post:
      type: object
      properties:
        id: { type: integer, format: int64 }
        lang: { type: string }
        section: { type: string }
        slug: { type: string }
        title: { type: string }
        date: { type: string }
        lastmod: { type: string }
        word_count: { type: integer, format: int64 }
        internal_links: { type: integer, format: int64 }
        source_count: { type: integer, format: int64 }
        url: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
paths:
  /auth/login:
    post:
      operationId: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, maxLength: 255 }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /sync:
    post:
      operationId: Sync
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  synced: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /hooks/deployed:
    post:
      operationId: HookDeployed
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deploy_id, changed]
              properties:
                deploy_id: { type: string, minLength: 1, maxLength: 255 }
                changed:
                  type: array
                  items: { type: string }
      responses:
        '202':
          description: Accepted — pending receipts recorded, no external call yet
          content:
            application/json:
              schema:
                type: object
                properties:
                  planned: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /archive/process:
    post:
      operationId: ProcessArchive
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limit]
              properties:
                limit: { type: integer, format: int64, minimum: 1 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer, format: int64 }
                  done: { type: integer, format: int64 }
                  failed: { type: integer, format: int64 }
                  deferred: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /receipts/retry:
    post:
      operationId: RetryReceipts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deploy_id, kind_filter]
              properties:
                deploy_id: { type: string, description: "filter — empty string means all deploys" }
                kind_filter: { type: string, description: "filter — empty string means all kinds" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending: { type: integer, format: int64 }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /receipts:
    get:
      operationId: ListReceipts
      security:
        - bearerAuth: []
      parameters:
        - name: target
          in: query
          required: false
          schema: { type: string }
        - name: kind
          in: query
          required: false
          schema: { type: string }
        - name: deploy_id
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  receipts:
                    type: array
                    items: { $ref: '#/components/schemas/Receipt' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /posts:
    get:
      operationId: ListPosts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items: { $ref: '#/components/schemas/Post' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
