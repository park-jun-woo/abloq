# abloqd 셀프호스트 한 장 — postgres + abloqd (+cron 프로필 9종) (Phase007·008·020)
#
# 사용:
#   1. yongol generate backend/specs backend/arts   # arts는 일회용 projection
#   2. deploy/backend/.env 에 자격증명 작성 (POSTGRES_PASSWORD, JWT_SECRET, BLOG_REPO_PATH,
#      아카이버: INDEXNOW_KEY, GSC_SA_JSON_FILE, WAYBACK_ACCESS_KEY/WAYBACK_SECRET_KEY)
#   3. docker compose -f deploy/backend/docker-compose.yaml up -d --build
#      (+아카이버 cron 백스톱까지: --profile backstop, ABLOQD_OPERATOR_* 필요)
#
# 멀티사이트 (Phase020, v0.2.0): abloqd 한 인스턴스가 사이트 N개를 서빙한다.
#   - 사이트 목록 SSOT는 sites.yaml (cp sites.yaml.example sites.yaml) —
#     아래 abloqd 서비스의 SITES_YAML_PATH env + 마운트 주석을 해제하고
#     사이트별 블로그 저장소를 /blogs/<name> 으로 마운트한다.
#   - 하위호환: SITES_YAML_PATH 없이 BLOG_REPO_PATH만 주면 기동 시
#     name=default 사이트 1개가 기존 사이트 단위 env 8종(BLOG_REPO_PATH,
#     QUEUE_EXPORT_REPO_URL·AUTHOR·AUTHOR_EMAIL, GSC_SITE_URL,
#     GSC_SA_JSON_PATH, CF_LOG_SOURCE, INDEXNOW_KEY)으로 합성된다.
#     멀티사이트로 가면 그 8종은 sites.yaml 의 사이트 행으로 이관한다
#     (빈 행 값은 전역 env fallback — 행 값이 항상 이긴다).
#   - 도메인 API 경로는 전부 /sites/<name>/… 로 이동했다 (기존 배포의
#     훅·cron 경로는 /sites/default/… 로 — docs/operations.md §마이그레이션).
#   - 기존 단일 사이트 DB는 migrate-0.2.0-multisite.sql 로 마이그레이션
#     (기존 데이터 전부 name=default 행으로 백필).
#
# blog.yaml ↔ manifest는 별개 SSOT(설계서 §10.3): abloqd는 마운트된 블로그
# 저장소의 blog.yaml(BLOG_REPO_PATH/blog.yaml)을 읽어 언어·섹션·URL 계약과
# geo 임계를 파라미터로 쓴다. blog.yaml은 이미지에 굽지 않고 저장소 마운트로
# 따라 들어온다 — 저장소 경로·자격증명은 전부 env로만 주입한다.
#
# 아카이버(Phase008) 트리거 구조:
#   - 배포 직후: CI가 login → POST /sites/<site>/hooks/deployed →
#     POST /sites/<site>/archive/process를 직접 호출한다
#     (template/files/deploy/archiver.md). 실행 시각 = 증거 가치.
#   - cron 백스톱(archiver-backstop, 권고 15분): failed/deferred 청소 전용 —
#     GET /sites?active_filter=true 순회로 사이트마다
#     login → POST /sites/<s>/receipts/retry → POST /sites/<s>/archive/process
#     순서가 필수다.
#     retry만 걸면 deferred가 영원히 실행되지 않고, process만 걸면
#     failed/deferred가 pending으로 돌아오지 않는다.

name: abloqd

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abloqd}
      POSTGRES_USER: ${POSTGRES_USER:-abloqd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 최초 기동 시 스키마 적용 (이후 마이그레이션은 운영 절차로).
      # v0.2.0에서 베이스라인을 멀티사이트 스키마로 재설정 — 신규 설치는
      # 0001 한 장이 전부다. 기존 단일 사이트 DB는 initdb가 아니라
      # migrate-0.2.0-multisite.sql 을 수동 적용한다 (default 백필).
      - ../../backend/arts/db/migrations/0001_initial.up.sql:/docker-entrypoint-initdb.d/0001_initial.up.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abloqd} -d ${POSTGRES_DB:-abloqd}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  abloqd:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-abloqd}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-abloqd}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>= 32 chars)}
      # ── 멀티사이트 (Phase020) ──────────────────────────────────────
      # sites.yaml 선언 SSOT를 쓰려면 아래 env와 volumes의 sites.yaml /
      # /blogs/<name> 마운트 주석을 해제한다. SITES_YAML_PATH가 설정되면
      # 기동 시 그 파일이 sites 테이블의 유일한 진실이 되고, 아래
      # "사이트 단위" env 8종(BLOG_REPO_PATH, QUEUE_EXPORT_REPO_URL·
      # AUTHOR·AUTHOR_EMAIL, GSC_SITE_URL, GSC_SA_JSON_PATH,
      # CF_LOG_SOURCE, INDEXNOW_KEY)은 sites.yaml의 사이트 행으로
      # 이관한다 (빈 행 값만 전역 env로 fallback).
      #SITES_YAML_PATH: /etc/abloqd/sites.yaml
      # 하위호환(단일 사이트): SITES_YAML_PATH 없이 BLOG_REPO_PATH만 주면
      # 기동 시 name=default 사이트 1개가 합성된다 — 컨테이너 안에서
      # 블로그 저장소는 항상 /blog, blog.yaml도 여기서 읽는다.
      BLOG_REPO_PATH: /blog
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIN_MODE: release
      # 아카이버 자격증명 (Phase008) — 전부 백엔드에만 있고 에이전트에는 없다.
      # 베이스 URL 4종(WAYBACK_BASE_URL, INDEXNOW_ENDPOINT, GSC_API_BASE,
      # GSC_TOKEN_URL)은 기본값이 실서비스 — 테스트 스텁에서만 오버라이드.
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
      GSC_SA_JSON_PATH: /etc/abloqd/gsc-sa.json
      GSC_DAILY_QUOTA: ${GSC_DAILY_QUOTA:-200}
      WAYBACK_ACCESS_KEY: ${WAYBACK_ACCESS_KEY:-}
      WAYBACK_SECRET_KEY: ${WAYBACK_SECRET_KEY:-}
      # 큐 exporter (Phase009) — /blog 마운트는 ro 인덱싱 전용이고 그대로 둔다.
      # 쓰기는 전용 작업 클론(QUEUE_EXPORT_WORKDIR, 이미지 기본
      # /var/lib/abloqd/queue-export)에서만: REPO_URL을 pull → quests/queue/
      # 기록 → 커밋 → deploy key 푸시. REPO_URL이 비면 POST /queue/export가
      # 500을 반환할 뿐 다른 모듈은 영향 없다.
      QUEUE_EXPORT_REPO_URL: ${QUEUE_EXPORT_REPO_URL:-}
      QUEUE_EXPORT_AUTHOR: ${QUEUE_EXPORT_AUTHOR:-abloqd-bot}
      QUEUE_EXPORT_AUTHOR_EMAIL: ${QUEUE_EXPORT_AUTHOR_EMAIL:-abloqd-bot@abloq.local}
      # 크롤 수집 (Phase012) — CF 로그 → crawl_hits. CF_LOG_SOURCE는 로컬
      # 디렉토리 또는 s3://bucket/prefix (비면 POST /ingest/crawl이 500을
      # 반환할 뿐 다른 모듈은 영향 없다). S3면 AWS_* 자격 env 필요 — 설계서
      # §3.3, 자격증명은 전부 백엔드에만. 커서는 닫힌 시간대 경계 단위:
      # CF 배달 지연(드물게 24h)이 의심되면 CF_LOG_MARGIN_HOURS를 올린다.
      CF_LOG_SOURCE: ${CF_LOG_SOURCE:-}
      CF_LOG_MARGIN_HOURS: ${CF_LOG_MARGIN_HOURS:-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      # GSC 폴링 (Phase013) — Search Analytics → gsc_snapshots. SA 자격은
      # 아카이버와 공유(GSC_SA_JSON_PATH), scope만 다르다(webmasters.readonly).
      # GSC_SEARCH_API_BASE·GSC_TOKEN_URL 기본값이 실서비스 — 스텁에서만
      # 오버라이드. GSC_SITE_URL이 비면 blog.yaml baseURL(URL-prefix 속성).
      GSC_SITE_URL: ${GSC_SITE_URL:-}
      GSC_DELAY_MARGIN_DAYS: ${GSC_DELAY_MARGIN_DAYS:-2}
      GSC_LOOKBACK_DAYS: ${GSC_LOOKBACK_DAYS:-28}
      GSC_INSPECT_RECENT_DAYS: ${GSC_INSPECT_RECENT_DAYS:-7}
      GSC_INSPECT_MAX: ${GSC_INSPECT_MAX:-10}
      # 인용 샘플링 (Phase013) — 키가 있는 엔진만 돈다(옵트인), 비용 상한은
      # blog.yaml geo.citation_budget(기본 0 = 비활성). 키는 전부 백엔드에만
      # (설계서 §3.3) — 에이전트·영수증에 절대 없다.
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CITATION_INTERVAL_MS: ${CITATION_INTERVAL_MS:-1000}
      # deploy key + known_hosts — git push가 ssh로 나갈 때만 쓰인다
      # (file:// 테스트 origin은 ssh를 타지 않는다).
      GIT_SSH_COMMAND: >-
        ssh -i /etc/abloqd/queue-deploy-key
        -o UserKnownHostsFile=/etc/abloqd/known_hosts
        -o IdentitiesOnly=yes
    volumes:
      - ${BLOG_REPO_PATH:?BLOG_REPO_PATH is required (host path of the blog repository)}:/blog:ro
      # ── 멀티사이트 마운트 (Phase020) — SITES_YAML_PATH를 켤 때 함께 ──
      # 사이트 선언 SSOT (cp sites.yaml.example sites.yaml)
      #- ./sites.yaml:/etc/abloqd/sites.yaml:ro
      # 사이트별 블로그 저장소 — /blogs/<name> 컨벤션 권장 (sites.yaml의
      # repo_path와 일치해야 한다; 코드는 선언된 절대경로만 신뢰)
      #- /srv/blogs/parkjunwoo:/blogs/parkjunwoo:ro
      #- /srv/blogs/second-blog:/blogs/second-blog:ro
      # GSC 서비스 계정 JSON (없으면 /dev/null — gsc_index 영수증이 failed로 남는다)
      - ${GSC_SA_JSON_FILE:-/dev/null}:/etc/abloqd/gsc-sa.json:ro
      # 큐 exporter deploy key(쓰기 권한)와 known_hosts (없으면 /dev/null —
      # ssh origin 푸시가 실패할 뿐 file:// origin은 무관)
      - ${QUEUE_DEPLOY_KEY_FILE:-/dev/null}:/etc/abloqd/queue-deploy-key:ro
      - ${QUEUE_KNOWN_HOSTS_FILE:-/dev/null}:/etc/abloqd/known_hosts:ro
      # 작업 클론 영속 볼륨 — 재시작마다 전체 클론을 다시 받지 않는다.
      # 멀티사이트: 사이트마다 /var/lib/abloqd/queue-export/<name>/ 하위
      # 클론을 따로 쓴다 (리포트 발행 클론은 <name>-reports).
      - queue-export:/var/lib/abloqd/queue-export
    ports:
      - "${ABLOQD_PORT:-8080}:8080"
    restart: unless-stopped

  # 아카이버 cron 백스톱 — failed/deferred 영수증 청소 (권고 15분 주기).
  # 시크릿은 operator 자격증명(토큰 아님): access token TTL 15분이라 토큰
  # 보관은 곧 401이 된다. 매 주기 login으로 새 토큰을 발급받는다.
  # 켜기: docker compose --profile backstop up -d
  archiver-backstop:
    image: alpine:3.21
    profiles: ["backstop"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the archiver backstop}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the archiver backstop}
      BACKSTOP_PERIOD_SECONDS: ${BACKSTOP_PERIOD_SECONDS:-900}
      BACKSTOP_PROCESS_LIMIT: ${BACKSTOP_PROCESS_LIMIT:-200}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$BACKSTOP_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "backstop: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "backstop: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ retry — failed/deferred → pending 재무장 (deferred 흡수에 필수).
            # 한 사이트 실패가 다음 사이트를 막지 않는다 (|| 로그 후 계속).
            curl -sf -X POST "http://abloqd:8080/sites/$$SITE/receipts/retry" \
              -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
              -d '{"deploy_id":"","kind_filter":""}' >/dev/null \
              || { echo "backstop: $$SITE retry failed"; true; }
            # ④ process — pending 일괄 실행 (멱등, limit로 쿼터 보호)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/archive/process" \
              -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
              -d "{\"limit\":$$BACKSTOP_PROCESS_LIMIT}" >/dev/null \
              || { echo "backstop: $$SITE process failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 크롤 수집 cron (Phase012, 권고 일간) — CF 로그 → crawl_hits. 아카이버
  # 백스톱 선례: 시크릿은 operator 자격증명, 매 주기 login으로 토큰 발급.
  # 멱등 — 커서가 닫힌 시간대만 전진하므로 재실행해도 이중 누적이 없다.
  # 재집계가 필요하면 커서 리셋과 해당 구간 crawl_hits DELETE를 반드시 한
  # 동작으로 (수동 SQL — backend/specs/db/ingest_cursors.sql 주석 참조).
  # 켜기: docker compose --profile crawl up -d
  crawl-ingest:
    image: alpine:3.21
    profiles: ["crawl"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the crawl ingest cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the crawl ingest cron}
      CRAWL_PERIOD_SECONDS: ${CRAWL_PERIOD_SECONDS:-86400}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$CRAWL_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "crawl: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "crawl: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ ingest — 닫힌 시간대 증분 수집 (멱등, 사이트별 커서)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/ingest/crawl" \
              -H "Authorization: Bearer $$TOKEN" >/dev/null \
              || { echo "crawl: $$SITE ingest failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # GSC 수집 cron (Phase013, 권고 일간) — Search Analytics → gsc_snapshots.
  # 멱등 — 커서(MAX(snap_date))가 닫힌 일자만 전진하므로 재실행해도 이중
  # 적재가 없다. inspect는 항상 false(쿼터 보호) — URL Inspection은 운영자가
  # 필요할 때 수동 호출한다. 켜기: docker compose --profile gsc up -d
  gsc-ingest:
    image: alpine:3.21
    profiles: ["gsc"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the gsc ingest cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the gsc ingest cron}
      GSC_PERIOD_SECONDS: ${GSC_PERIOD_SECONDS:-86400}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$GSC_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "gsc: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "gsc: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ ingest — 닫힌 일자 증분 수집 (멱등, inspect 항상 off)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/ingest/gsc" \
              -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
              -d '{"inspect":false}' >/dev/null \
              || { echo "gsc: $$SITE ingest failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 인용 샘플링 cron (Phase013, 권고 주간) — active 질의 셋 1회전 실행.
  # blog.yaml geo.citation_budget=0(기본)이면 no-op이므로 켜 두어도 비용이
  # 없다. 샘플은 추세 기록 전용 — 어떤 게이트·판정에도 입력되지 않는다(§6.3).
  # 켜기: docker compose --profile citation up -d
  citation-sample:
    image: alpine:3.21
    profiles: ["citation"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the citation sample cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the citation sample cron}
      CITATION_PERIOD_SECONDS: ${CITATION_PERIOD_SECONDS:-604800}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$CITATION_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "citation: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "citation: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ sample — budget 상한 1회전 (사이트 blog.yaml budget 0이면 no-op)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/sample/citations" \
              -H "Authorization: Bearer $$TOKEN" >/dev/null \
              || { echo "citation: $$SITE sample failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 월간 리포트 cron (Phase014, 권고 월간) — 크롤×색인×인용 결합 리포트를
  # 생성·저장하고 markdown 발행 사본을 블로그 저장소에 푸시한다. body의
  # ym=''는 직전 닫힌 월(UTC) — 윈도 @get SQL이 자체 해석하므로 cron은
  # 항상 body를 고정해 보낸다. 멱등 — 같은 ym 재생성은 upsert 수렴 +
  # 동일 내용 git no-op. 발행은 큐 exporter와 같은 QUEUE_EXPORT_* env를
  # 공유하되 작업 클론은 "-reports" 접미사로 분리된다.
  # 켜기: docker compose --profile report up -d
  report-monthly:
    image: alpine:3.21
    profiles: ["report"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the monthly report cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the monthly report cron}
      REPORT_PERIOD_SECONDS: ${REPORT_PERIOD_SECONDS:-2592000}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$REPORT_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "report: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "report: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ generate — 직전 닫힌 월 리포트 생성·발행 (멱등, (site, ym) 독립)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/reports/monthly" \
              -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
              -d '{"ym":""}' >/dev/null \
              || { echo "report: $$SITE generate failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 신선도 스캔 cron (Phase019, 권고 월간) — posts lastmod × geo.freshness_days
  # 초과분을 kind=refresh로 적재한다. 멱등 — 중복 없는 insert(open/exported
  # 큐에 이미 있으면 재적재 없음). body ym=''는 직전 닫힌 월(UTC) — 탐지에는
  # 무관, 우선순위 신호 윈도만 정한다. 스캔 직후 발급은 queue-export 서비스가
  # 다음 주기에 수행한다(전용 트리거 없음 — 멱등 재호출 한 종으로 통일).
  # 켜기: docker compose --profile freshness up -d
  freshness-scan:
    image: alpine:3.21
    profiles: ["freshness"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the freshness scan cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the freshness scan cron}
      FRESHNESS_PERIOD_SECONDS: ${FRESHNESS_PERIOD_SECONDS:-2592000}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$FRESHNESS_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "freshness: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "freshness: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ scan — 신선도 초과 글 적재 (멱등, ym=''=직전 닫힌 월)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/scans/freshness" \
              -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
              -d '{"ym":""}' >/dev/null \
              || { echo "freshness: $$SITE scan failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 근거 스캔 cron (Phase019, 권고 분기) — 무출처 수치 주장 + link rot
  # (3-strike)를 kind=evidence로 적재한다. 멱등 — 중복 없는 insert. 분기
  # 주기인 이유: 본문 주장 변화는 느리고 rot 판정은 스캔 3회 연속 실패
  # 누적이라 과도한 주기는 오탐만 늘린다. body 없음(window 무관).
  # 켜기: docker compose --profile evidence up -d
  evidence-scan:
    image: alpine:3.21
    profiles: ["evidence"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the evidence scan cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the evidence scan cron}
      EVIDENCE_PERIOD_SECONDS: ${EVIDENCE_PERIOD_SECONDS:-7776000}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$EVIDENCE_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "evidence: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "evidence: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ scan — 무출처 주장·link rot 적재 (멱등, link check 포함이라 -m 600)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/scans/evidence" \
              -H "Authorization: Bearer $$TOKEN" >/dev/null \
              || { echo "evidence: $$SITE scan failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 클러스터 스캔 cron (Phase019, 권고 분기) — 내부 링크 위반(고립·orphan·
  # min_internal_links·taxonomy)을 kind=cluster로 적재한다. 멱등 — 중복 없는
  # insert. 링크 구조 변화는 느려 분기면 충분하다. body 없음.
  # 켜기: docker compose --profile cluster up -d
  cluster-scan:
    image: alpine:3.21
    profiles: ["cluster"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the cluster scan cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the cluster scan cron}
      CLUSTER_PERIOD_SECONDS: ${CLUSTER_PERIOD_SECONDS:-7776000}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$CLUSTER_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "cluster: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "cluster: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ scan — 내부 링크 위반 적재 (멱등)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/scans/cluster" \
              -H "Authorization: Bearer $$TOKEN" >/dev/null \
              || { echo "cluster: $$SITE scan failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

  # 큐 export cron (Phase019, 권고 주간) — 한 사이클이 pull→consumed 감지
  # →기록→push 전부 수행한다(D4: 이게 안 돌면 백엔드→에이전트 접점 단절).
  # "월간 export(스캔 직후) + 주간 consumed 동기화"가 전부 이 한 호출의
  # 멱등 재실행이다 — 전용 endpoint가 없고 필요도 없다: open 행이 있으면
  # 발급되고, 에이전트가 지운 큐 파일이 있으면 consumed로 동기화되고,
  # 둘 다 없으면 no-op(커밋 없음)이다. 주간 주기가 월간 스캔 직후 발급을
  # 늦어도 7일 내 흡수한다. 켜기: docker compose --profile queue up -d
  queue-export:
    image: alpine:3.21
    profiles: ["queue"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the queue export cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the queue export cron}
      QUEUE_EXPORT_PERIOD_SECONDS: ${QUEUE_EXPORT_PERIOD_SECONDS:-604800}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$QUEUE_EXPORT_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "queue: login failed"; continue; }
          # ② 사이트 목록 — 멀티사이트 fan-out은 셸 소관 (1 요청 = 1 사이트)
          SITES=$$(curl -sf http://abloqd:8080/sites?active_filter=true \
            -H "Authorization: Bearer $$TOKEN" | jq -r '.sites[].name') \
            || { echo "queue: site list failed"; continue; }
          for SITE in $$SITES; do
            # ③ export — open 발급 + consumed 동기화 한 사이클 (멱등, git 작업 포함이라 -m 600)
            curl -sf -m 600 -X POST "http://abloqd:8080/sites/$$SITE/queue/export" \
              -H "Authorization: Bearer $$TOKEN" >/dev/null \
              || { echo "queue: $$SITE export failed (next cycle retries)"; true; }
          done
        done
    restart: unless-stopped

volumes:
  pgdata:
  queue-export:
