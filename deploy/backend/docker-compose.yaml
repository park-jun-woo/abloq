# abloqd 셀프호스트 한 장 — postgres + abloqd (+아카이버 cron 백스톱) (Phase007·008)
#
# 사용:
#   1. yongol generate backend/specs backend/arts   # arts는 일회용 projection
#   2. deploy/backend/.env 에 자격증명 작성 (POSTGRES_PASSWORD, JWT_SECRET, BLOG_REPO_PATH,
#      아카이버: INDEXNOW_KEY, GSC_SA_JSON_FILE, WAYBACK_ACCESS_KEY/WAYBACK_SECRET_KEY)
#   3. docker compose -f deploy/backend/docker-compose.yaml up -d --build
#      (+아카이버 cron 백스톱까지: --profile backstop, ABLOQD_OPERATOR_* 필요)
#
# blog.yaml ↔ manifest는 별개 SSOT(설계서 §10.3): abloqd는 마운트된 블로그
# 저장소의 blog.yaml(BLOG_REPO_PATH/blog.yaml)을 읽어 언어·섹션·URL 계약과
# geo 임계를 파라미터로 쓴다. blog.yaml은 이미지에 굽지 않고 저장소 마운트로
# 따라 들어온다 — 저장소 경로·자격증명은 전부 env로만 주입한다.
#
# 아카이버(Phase008) 트리거 구조:
#   - 배포 직후: CI가 login → POST /hooks/deployed → POST /archive/process를
#     직접 호출한다 (template/files/deploy/archiver.md). 실행 시각 = 증거 가치.
#   - cron 백스톱(archiver-backstop, 권고 15분): failed/deferred 청소 전용 —
#     login → POST /receipts/retry → POST /archive/process 순서가 필수다.
#     retry만 걸면 deferred가 영원히 실행되지 않고, process만 걸면
#     failed/deferred가 pending으로 돌아오지 않는다.

name: abloqd

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abloqd}
      POSTGRES_USER: ${POSTGRES_USER:-abloqd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 최초 기동 시 스키마 적용 (이후 마이그레이션은 운영 절차로)
      - ../../backend/arts/db/migrations/0001_initial.up.sql:/docker-entrypoint-initdb.d/0001_initial.up.sql:ro
      - ../../backend/arts/db/migrations/0002_create_ingest_cursors_and_more.up.sql:/docker-entrypoint-initdb.d/0002_create_ingest_cursors_and_more.up.sql:ro
      - ../../backend/arts/db/migrations/0003_add_citation_samples_extractor_version.up.sql:/docker-entrypoint-initdb.d/0003_add_citation_samples_extractor_version.up.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abloqd} -d ${POSTGRES_DB:-abloqd}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  abloqd:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-abloqd}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-abloqd}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>= 32 chars)}
      # 컨테이너 안에서 블로그 저장소는 항상 /blog — blog.yaml도 여기서 읽는다
      BLOG_REPO_PATH: /blog
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GIN_MODE: release
      # 아카이버 자격증명 (Phase008) — 전부 백엔드에만 있고 에이전트에는 없다.
      # 베이스 URL 4종(WAYBACK_BASE_URL, INDEXNOW_ENDPOINT, GSC_API_BASE,
      # GSC_TOKEN_URL)은 기본값이 실서비스 — 테스트 스텁에서만 오버라이드.
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
      GSC_SA_JSON_PATH: /etc/abloqd/gsc-sa.json
      GSC_DAILY_QUOTA: ${GSC_DAILY_QUOTA:-200}
      WAYBACK_ACCESS_KEY: ${WAYBACK_ACCESS_KEY:-}
      WAYBACK_SECRET_KEY: ${WAYBACK_SECRET_KEY:-}
      # 큐 exporter (Phase009) — /blog 마운트는 ro 인덱싱 전용이고 그대로 둔다.
      # 쓰기는 전용 작업 클론(QUEUE_EXPORT_WORKDIR, 이미지 기본
      # /var/lib/abloqd/queue-export)에서만: REPO_URL을 pull → quests/queue/
      # 기록 → 커밋 → deploy key 푸시. REPO_URL이 비면 POST /queue/export가
      # 500을 반환할 뿐 다른 모듈은 영향 없다.
      QUEUE_EXPORT_REPO_URL: ${QUEUE_EXPORT_REPO_URL:-}
      QUEUE_EXPORT_AUTHOR: ${QUEUE_EXPORT_AUTHOR:-abloqd-bot}
      QUEUE_EXPORT_AUTHOR_EMAIL: ${QUEUE_EXPORT_AUTHOR_EMAIL:-abloqd-bot@abloq.local}
      # 크롤 수집 (Phase012) — CF 로그 → crawl_hits. CF_LOG_SOURCE는 로컬
      # 디렉토리 또는 s3://bucket/prefix (비면 POST /ingest/crawl이 500을
      # 반환할 뿐 다른 모듈은 영향 없다). S3면 AWS_* 자격 env 필요 — 설계서
      # §3.3, 자격증명은 전부 백엔드에만. 커서는 닫힌 시간대 경계 단위:
      # CF 배달 지연(드물게 24h)이 의심되면 CF_LOG_MARGIN_HOURS를 올린다.
      CF_LOG_SOURCE: ${CF_LOG_SOURCE:-}
      CF_LOG_MARGIN_HOURS: ${CF_LOG_MARGIN_HOURS:-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      # GSC 폴링 (Phase013) — Search Analytics → gsc_snapshots. SA 자격은
      # 아카이버와 공유(GSC_SA_JSON_PATH), scope만 다르다(webmasters.readonly).
      # GSC_SEARCH_API_BASE·GSC_TOKEN_URL 기본값이 실서비스 — 스텁에서만
      # 오버라이드. GSC_SITE_URL이 비면 blog.yaml baseURL(URL-prefix 속성).
      GSC_SITE_URL: ${GSC_SITE_URL:-}
      GSC_DELAY_MARGIN_DAYS: ${GSC_DELAY_MARGIN_DAYS:-2}
      GSC_LOOKBACK_DAYS: ${GSC_LOOKBACK_DAYS:-28}
      GSC_INSPECT_RECENT_DAYS: ${GSC_INSPECT_RECENT_DAYS:-7}
      GSC_INSPECT_MAX: ${GSC_INSPECT_MAX:-10}
      # 인용 샘플링 (Phase013) — 키가 있는 엔진만 돈다(옵트인), 비용 상한은
      # blog.yaml geo.citation_budget(기본 0 = 비활성). 키는 전부 백엔드에만
      # (설계서 §3.3) — 에이전트·영수증에 절대 없다.
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CITATION_INTERVAL_MS: ${CITATION_INTERVAL_MS:-1000}
      # deploy key + known_hosts — git push가 ssh로 나갈 때만 쓰인다
      # (file:// 테스트 origin은 ssh를 타지 않는다).
      GIT_SSH_COMMAND: >-
        ssh -i /etc/abloqd/queue-deploy-key
        -o UserKnownHostsFile=/etc/abloqd/known_hosts
        -o IdentitiesOnly=yes
    volumes:
      - ${BLOG_REPO_PATH:?BLOG_REPO_PATH is required (host path of the blog repository)}:/blog:ro
      # GSC 서비스 계정 JSON (없으면 /dev/null — gsc_index 영수증이 failed로 남는다)
      - ${GSC_SA_JSON_FILE:-/dev/null}:/etc/abloqd/gsc-sa.json:ro
      # 큐 exporter deploy key(쓰기 권한)와 known_hosts (없으면 /dev/null —
      # ssh origin 푸시가 실패할 뿐 file:// origin은 무관)
      - ${QUEUE_DEPLOY_KEY_FILE:-/dev/null}:/etc/abloqd/queue-deploy-key:ro
      - ${QUEUE_KNOWN_HOSTS_FILE:-/dev/null}:/etc/abloqd/known_hosts:ro
      # 작업 클론 영속 볼륨 — 재시작마다 전체 클론을 다시 받지 않는다
      - queue-export:/var/lib/abloqd/queue-export
    ports:
      - "${ABLOQD_PORT:-8080}:8080"
    restart: unless-stopped

  # 아카이버 cron 백스톱 — failed/deferred 영수증 청소 (권고 15분 주기).
  # 시크릿은 operator 자격증명(토큰 아님): access token TTL 15분이라 토큰
  # 보관은 곧 401이 된다. 매 주기 login으로 새 토큰을 발급받는다.
  # 켜기: docker compose --profile backstop up -d
  archiver-backstop:
    image: alpine:3.21
    profiles: ["backstop"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the archiver backstop}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the archiver backstop}
      BACKSTOP_PERIOD_SECONDS: ${BACKSTOP_PERIOD_SECONDS:-900}
      BACKSTOP_PROCESS_LIMIT: ${BACKSTOP_PROCESS_LIMIT:-200}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$BACKSTOP_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "backstop: login failed"; continue; }
          # ② retry — failed/deferred → pending 재무장 (deferred 흡수에 필수)
          curl -sf -X POST http://abloqd:8080/receipts/retry \
            -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
            -d '{"deploy_id":"","kind_filter":""}' >/dev/null \
            || echo "backstop: retry failed"
          # ③ process — pending 일괄 실행 (멱등, limit로 쿼터 보호)
          curl -sf -m 600 -X POST http://abloqd:8080/archive/process \
            -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json' \
            -d "{\"limit\":$$BACKSTOP_PROCESS_LIMIT}" >/dev/null \
            || echo "backstop: process failed (next cycle retries)"
        done
    restart: unless-stopped

  # 크롤 수집 cron (Phase012, 권고 일간) — CF 로그 → crawl_hits. 아카이버
  # 백스톱 선례: 시크릿은 operator 자격증명, 매 주기 login으로 토큰 발급.
  # 멱등 — 커서가 닫힌 시간대만 전진하므로 재실행해도 이중 누적이 없다.
  # 재집계가 필요하면 커서 리셋과 해당 구간 crawl_hits DELETE를 반드시 한
  # 동작으로 (수동 SQL — backend/specs/db/ingest_cursors.sql 주석 참조).
  # 켜기: docker compose --profile crawl up -d
  crawl-ingest:
    image: alpine:3.21
    profiles: ["crawl"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the crawl ingest cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the crawl ingest cron}
      CRAWL_PERIOD_SECONDS: ${CRAWL_PERIOD_SECONDS:-86400}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$CRAWL_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$$ABLOQD_OPERATOR_EMAIL\",\"password\":\"$$ABLOQD_OPERATOR_PASSWORD\"}" \
            | jq -r .access_token) || { echo "crawl: login failed"; continue; }
          # ② ingest — 닫힌 시간대 증분 수집 (멱등)
          curl -sf -m 600 -X POST http://abloqd:8080/ingest/crawl \
            -H "Authorization: Bearer $$TOKEN" >/dev/null \
            || echo "crawl: ingest failed (next cycle retries)"
        done
    restart: unless-stopped

  # GSC 수집 cron (Phase013, 권고 일간) — Search Analytics → gsc_snapshots.
  # 멱등 — 커서(MAX(snap_date))가 닫힌 일자만 전진하므로 재실행해도 이중
  # 적재가 없다. inspect는 항상 false(쿼터 보호) — URL Inspection은 운영자가
  # 필요할 때 수동 호출한다. 켜기: docker compose --profile gsc up -d
  gsc-ingest:
    image: alpine:3.21
    profiles: ["gsc"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the gsc ingest cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the gsc ingest cron}
      GSC_PERIOD_SECONDS: ${GSC_PERIOD_SECONDS:-86400}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$GSC_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급 (access token TTL 15분)
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login             -H 'Content-Type: application/json'             -d "{"email":"$$ABLOQD_OPERATOR_EMAIL","password":"$$ABLOQD_OPERATOR_PASSWORD"}"             | jq -r .access_token) || { echo "gsc: login failed"; continue; }
          # ② ingest — 닫힌 일자 증분 수집 (멱등, inspect 항상 off)
          curl -sf -m 600 -X POST http://abloqd:8080/ingest/gsc             -H "Authorization: Bearer $$TOKEN" -H 'Content-Type: application/json'             -d '{"inspect":false}' >/dev/null             || echo "gsc: ingest failed (next cycle retries)"
        done
    restart: unless-stopped

  # 인용 샘플링 cron (Phase013, 권고 주간) — active 질의 셋 1회전 실행.
  # blog.yaml geo.citation_budget=0(기본)이면 no-op이므로 켜 두어도 비용이
  # 없다. 샘플은 추세 기록 전용 — 어떤 게이트·판정에도 입력되지 않는다(§6.3).
  # 켜기: docker compose --profile citation up -d
  citation-sample:
    image: alpine:3.21
    profiles: ["citation"]
    depends_on:
      - abloqd
    environment:
      ABLOQD_OPERATOR_EMAIL: ${ABLOQD_OPERATOR_EMAIL:?operator email for the citation sample cron}
      ABLOQD_OPERATOR_PASSWORD: ${ABLOQD_OPERATOR_PASSWORD:?operator password for the citation sample cron}
      CITATION_PERIOD_SECONDS: ${CITATION_PERIOD_SECONDS:-604800}
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq >/dev/null
        while true; do
          sleep "$$CITATION_PERIOD_SECONDS"
          # ① login — 매 주기 토큰 발급
          TOKEN=$$(curl -sf -X POST http://abloqd:8080/auth/login             -H 'Content-Type: application/json'             -d "{"email":"$$ABLOQD_OPERATOR_EMAIL","password":"$$ABLOQD_OPERATOR_PASSWORD"}"             | jq -r .access_token) || { echo "citation: login failed"; continue; }
          # ② sample — budget 상한 1회전 (budget 0이면 no-op)
          curl -sf -m 600 -X POST http://abloqd:8080/sample/citations             -H "Authorization: Bearer $$TOKEN" >/dev/null             || echo "citation: sample failed (next cycle retries)"
        done
    restart: unless-stopped

volumes:
  pgdata:
  queue-export:
