    anchors: ["wasn't lying", "LLMs are optimistic"]
  - id: feedback-resolution
    text: "피드백 해상도가 높을수록 LLM의 수정 정확도가 오르고 루프 반복과 비용이 준다"
    kind: claim
    requires_source: true
    anchors: ["feedback resolution increases", "gradient signal"]
  - id: progress-survives
